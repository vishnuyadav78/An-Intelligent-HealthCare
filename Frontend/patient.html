<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>IntelliHealth | AI Diagnostic & Patient Management</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <!-- jsPDF & html2canvas -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: radial-gradient(circle at 10% 20%, rgba(226, 240, 255, 0.5) 0%, rgba(241, 245, 249, 0.9) 100%);
      background-color: #f0f4fa;
      color: #0a2540;
      padding: 1.5rem;
      min-height: 100vh;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      position: relative;
    }

    /* top bar - glass style */
    .top-bar {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 1.5rem;
    }

    .ai-diagnosis-btn {
      background: linear-gradient(115deg, #ffffff 0%, #f8fcff 100%);
      backdrop-filter: blur(4px);
      color: #1e4a76;
      border: 1px solid rgba(37, 99, 235, 0.25);
      padding: 0.7rem 1.5rem;
      border-radius: 3rem;
      font-weight: 700;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.25s ease;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      box-shadow: 0 6px 14px rgba(0, 20, 40, 0.05);
      letter-spacing: -0.2px;
    }

    .ai-diagnosis-btn:hover {
      transform: translateY(-3px);
      border-color: #3b82f6;
      box-shadow: 0 12px 22px -8px rgba(37, 99, 235, 0.25);
      background: white;
    }

    /* hero with correct heading */
    .hero {
      text-align: center;
      margin-bottom: 2.2rem;
    }

    .hero h1 {
      font-size: clamp(1.8rem, 6vw, 2.5rem);
      font-weight: 800;
      background: linear-gradient(145deg, #0c4e6e, #1e4a8a, #2563eb);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      letter-spacing: -0.02em;
      margin-bottom: 0.5rem;
    }

    .hero p {
      font-size: 1rem;
      color: #4b6b8f;
      font-weight: 500;
      border-bottom: 2px solid rgba(37, 99, 235, 0.2);
      display: inline-block;
      padding-bottom: 0.3rem;
    }

    /* main card - modern */
    .form-card {
      background: rgba(255, 255, 255, 0.96);
      backdrop-filter: blur(2px);
      border-radius: 2.5rem;
      box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.15), 0 2px 5px rgba(0, 0, 0, 0.02);
      padding: 2rem 2rem 2.2rem;
      border: 1px solid rgba(255, 255, 255, 0.6);
      transition: transform 0.2s ease, box-shadow 0.3s;
    }

    .form-card:hover {
      box-shadow: 0 30px 55px -15px rgba(0, 0, 0, 0.2);
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(290px, 1fr));
      gap: 1.6rem;
      margin-bottom: 2rem;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .input-group label {
      font-weight: 700;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      color: #1e3a5f;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    input, select {
      padding: 0.9rem 1rem;
      border-radius: 1.2rem;
      border: 1.5px solid #e2edf7;
      background: #ffffff;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      font-weight: 500;
      transition: all 0.2s;
      outline: none;
      color: #0a2540;
    }

    input:focus, select:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
      background-color: #fff;
    }

    input[readonly] {
      background: #f1f6fd;
      border-color: #d9e6f7;
      color: #1f4a76;
      font-weight: 500;
    }

    /* radio group - pill style */
    .radio-group {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      align-items: center;
      background: #f8fbfe;
      padding: 0.7rem 1.2rem;
      border-radius: 2rem;
      border: 1.5px solid #e2edf7;
      transition: all 0.2s;
    }

    .radio-group label {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: white;
      padding: 0.45rem 1rem;
      border-radius: 2rem;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.85rem;
      transition: 0.2s;
      border: 1px solid transparent;
    }

    .radio-group label:has(input:checked) {
      background: #eef4ff;
      border-color: #3b82f6;
      color: #1e40af;
      box-shadow: 0 2px 8px rgba(59,130,246,0.2);
    }

    .radio-group input {
      accent-color: #2563eb;
      width: 1rem;
      height: 1rem;
      margin: 0;
    }

    /* submit button */
    .btn-submit {
      background: linear-gradient(105deg, #0f2b3d 0%, #1e4a76 100%);
      color: white;
      border: none;
      padding: 1rem;
      font-weight: 700;
      font-size: 1rem;
      border-radius: 3rem;
      cursor: pointer;
      width: 100%;
      transition: all 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      box-shadow: 0 8px 20px -6px rgba(30, 64, 118, 0.3);
      letter-spacing: 0.3px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
    }

    .btn-submit:hover {
      background: linear-gradient(105deg, #0b2a3f, #2563eb);
      transform: translateY(-2px);
      box-shadow: 0 15px 25px -10px #1e3a8a70;
    }

    .btn-submit:disabled {
      background: #a0bbd9;
      transform: none;
      box-shadow: none;
      cursor: not-allowed;
    }

    .message-area {
      margin-top: 1.8rem;
      padding: 1rem 1.2rem;
      border-radius: 1.5rem;
      text-align: center;
      font-weight: 600;
      font-size: 0.9rem;
      backdrop-filter: blur(4px);
      transition: all 0.2s;
    }

    .success-message {
      background: #e0f8e8;
      color: #0b5e2e;
      border-left: 5px solid #2bcc6e;
      box-shadow: 0 4px 10px rgba(0,0,0,0.02);
    }

    .error-message {
      background: #ffe8e8;
      color: #b91c1c;
      border-left: 5px solid #f97373;
    }

    .info-message {
      background: #eef4ff;
      color: #1e4a76;
      border-left: 5px solid #3b82f6;
    }

    footer {
      text-align: center;
      margin-top: 2rem;
      font-size: 0.75rem;
      font-weight: 500;
      color: #6a7c9e;
      letter-spacing: 0.3px;
    }

    /* Modal overlay */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(10, 25, 47, 0.75);
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      visibility: hidden;
      opacity: 0;
      transition: visibility 0.2s, opacity 0.3s ease;
    }

    .modal-overlay.active {
      visibility: visible;
      opacity: 1;
    }

    .modal-content {
      background: #ffffff;
      border-radius: 2rem;
      max-width: 600px;
      width: 90%;
      max-height: 90vh;
      overflow-y: auto;
      padding: 2rem;
      box-shadow: 0 35px 60px -20px rgba(0, 0, 0, 0.4);
      text-align: center;
      transform: scale(0.96);
      transition: transform 0.25s ease-out;
      border: 1px solid rgba(37, 99, 235, 0.15);
    }

    .modal-overlay.active .modal-content {
      transform: scale(1);
    }

    .modal-content h2 {
      font-size: 1.7rem;
      font-weight: 800;
      background: linear-gradient(135deg, #1e3a8a, #2563eb);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      margin-bottom: 0.5rem;
    }

    .modal-content .subhead {
      color: #3b82f6;
      margin-bottom: 1rem;
      font-weight: 600;
      font-size: 0.9rem;
    }

    .modal-content .success-badge {
      background: #dff9e6;
      padding: 0.5rem 1rem;
      border-radius: 3rem;
      margin-bottom: 1.5rem;
      font-weight: 700;
      color: #117f3a;
      display: inline-block;
      font-size: 0.9rem;
    }

    .modal-content .details {
      text-align: left;
      margin: 1rem 0 1rem;
      background: #fafcff;
      padding: 1.2rem;
      border-radius: 1.5rem;
      border: 1px solid #eef2ff;
    }

    .modal-content .details p {
      margin: 0.6rem 0;
      font-size: 0.95rem;
      font-weight: 500;
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .modal-content .details p strong {
      width: 130px;
      color: #1e4a76;
    }

    .modal-content .prescription-area {
      margin-top: 1.2rem;
      border-top: 1px solid #e2edf7;
      padding-top: 1.2rem;
      text-align: left;
    }

    .modal-content .prescription-area label {
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.8rem;
      color: #0f3b5c;
    }

    .modal-content textarea {
      width: 100%;
      border: 1.5px solid #dce5f0;
      border-radius: 1.2rem;
      padding: 0.9rem;
      font-family: 'Inter', monospace;
      resize: vertical;
      font-size: 0.9rem;
      transition: 0.2s;
    }

    .modal-content textarea:focus {
      border-color: #3b82f6;
      outline: none;
      box-shadow: 0 0 0 3px rgba(59,130,246,0.2);
    }

    .modal-content .close-btn {
      background: linear-gradient(105deg, #1f3a64, #1e4a76);
      color: white;
      border: none;
      padding: 0.8rem 2rem;
      border-radius: 3rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 1.8rem;
      transition: 0.2s;
      font-size: 0.9rem;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    }

    .modal-content .close-btn:hover {
      background: linear-gradient(105deg, #2563eb, #1e3a8a);
      transform: translateY(-2px);
    }

    /* PDF hidden container - fixed heading with blue strip */
    #pdfPrintContent {
      position: absolute;
      left: -9999px;
      top: 0;
      width: 580px;
      background: white;
      padding: 0;
      font-family: 'Inter', sans-serif;
      border-radius: 1rem;
      box-shadow: 0 25px 40px rgba(0,0,0,0.1);
      z-index: -1;
      line-height: 1.5;
      overflow: hidden;
    }

    /* Blue strip header for PDF */
    .pdf-header {
      background: linear-gradient(135deg, #1e3a8a, #2563eb);
      padding: 1.2rem 1.5rem;
      text-align: center;
      border-bottom: 3px solid #ffffff30;
    }

    .pdf-header h2 {
      font-size: 1.8rem;
      font-weight: 800;
      color: white;
      margin: 0;
      letter-spacing: -0.3px;
      text-shadow: 0 1px 2px rgba(0,0,0,0.1);
    }

    .pdf-header .pdf-subhead {
      color: rgba(255,255,255,0.9);
      font-weight: 500;
      font-size: 0.85rem;
      margin-top: 0.3rem;
    }

    .pdf-content {
      padding: 1.5rem;
    }

    .success-badge-pdf {
      background: #e2f7e8;
      text-align: center;
      padding: 0.5rem;
      border-radius: 2rem;
      margin-bottom: 1.2rem;
      font-weight: 700;
      color: #0b5e2e;
    }

    .details-card {
      text-align: left;
      background: #fafcff;
      padding: 1rem;
      border-radius: 1.2rem;
      border: 1px solid #eef2ff;
      margin: 1rem 0;
    }

    .details-card p {
      margin: 0.5rem 0;
      font-size: 0.9rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .details-card p strong {
      width: 130px;
      color: #1e4a76;
    }

    .prescription-pdf {
      margin-top: 1rem;
      border-top: 1px dashed #cbd5e1;
      padding-top: 1rem;
    }

    .prescription-pdf label {
      font-weight: 700;
      display: block;
      margin-bottom: 0.5rem;
      color: #0f3b5c;
    }

    .prescription-pdf textarea {
      width: 100%;
      border: 1px solid #cbd5e1;
      border-radius: 1rem;
      padding: 0.75rem;
      font-family: monospace;
      font-size: 0.85rem;
      resize: vertical;
    }

    /* Responsive */
    @media (max-width: 780px) {
      body {
        padding: 1rem;
      }
      .form-card {
        padding: 1.5rem;
      }
      .form-grid {
        gap: 1.2rem;
      }
      .radio-group {
        flex-direction: column;
        align-items: flex-start;
        border-radius: 1.5rem;
      }
      .radio-group label {
        width: 100%;
        justify-content: flex-start;
      }
      .modal-content {
        padding: 1.5rem;
      }
      .modal-content .details p strong {
        width: 100%;
        margin-bottom: 0.2rem;
      }
    }

    @media (max-width: 480px) {
      .hero h1 {
        font-size: 1.7rem;
      }
      .ai-diagnosis-btn {
        padding: 0.5rem 1.1rem;
        font-size: 0.8rem;
      }
      .btn-submit {
        padding: 0.8rem;
      }
      .modal-content .close-btn {
        width: 100%;
      }
    }

    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    ::-webkit-scrollbar-track {
      background: #eef2fa;
      border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb {
      background: #b9d0f0;
      border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #3b82f6;
    }
  </style>
</head>
<body>
<div class="container">
  <div class="top-bar">
    <a href="medivision.html" class="ai-diagnosis-btn">🤖 AI Diagnosis</a>
  </div>

  <div class="hero">
    <h1>🏥 An Intelligent Healthcare System</h1>
    <p>AI‑Based Diagnostic & Patient Management Solution</p>
  </div>
  <div class="form-card">
    <form id="patientForm">
      <div class="form-grid">
        <div class="input-group"><label>👤 Full Name *</label><input type="text" id="fullName" required placeholder="John Carter"></div>
        <div class="input-group"><label>⚥ Gender *</label><select id="gender" required><option value="">Select</option><option>Male</option><option>Female</option><option>Other</option></select></div>
        <div class="input-group"><label>📅 Age *</label><input type="number" id="age" min="0" max="120" placeholder="e.g., 34" required></div>
        <div class="input-group"><label>📍 Location *</label><input type="text" id="location" required placeholder="City, State"></div>
        <div class="input-group"><label>📆 Registration Date</label><input type="date" id="regDate" required></div>
        <div class="input-group"><label>🆔 Patient ID (Auto)</label><input type="text" id="patientIdPreview" readonly></div>
      </div>
      <div style="margin-bottom: 2rem;">
        <label style="font-weight: 700; display: block; margin-bottom: 0.6rem; letter-spacing:0.3px;">🚨 Consultation Type *</label>
        <div class="radio-group">
          <label><input type="radio" name="consultType" value="Emergency" required> 🚑 Emergency</label>
          <label><input type="radio" name="consultType" value="OPD"> 🩺 OPD (Outpatient)</label>
        </div>
      </div>
      <button type="submit" class="btn-submit" id="submitBtn">✨ Submit & Allocate Doctor ✨</button>
    </form>
    <div id="feedbackMessage" class="message-area" style="display: none;"></div>
  </div>
  <footer>© An Intelligent Healthcare System</footer>
</div>

<!-- Modal for popup -->
<div id="pdfModal" class="modal-overlay">
  <div class="modal-content" id="modalContent"></div>
</div>

<!-- Hidden div for PDF generation - now with blue strip header -->
<div id="pdfPrintContent"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getDatabase, ref, get, set, runTransaction, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDgZjOFKQosy64nOtOwZaWGD8gSe7eX5NY",
    authDomain: "first-1fbe1.firebaseapp.com",
    databaseURL: "https://first-1fbe1-default-rtdb.firebaseio.com",
    projectId: "first-1fbe1",
    storageBucket: "first-1fbe1.firebasestorage.app",
    messagingSenderId: "392953345039",
    appId: "1:392953345039:web:aa36154e3e3635a94a9f7a"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  const form = document.getElementById('patientForm');
  const submitBtn = document.getElementById('submitBtn');
  const feedbackDiv = document.getElementById('feedbackMessage');
  const patientIdPreview = document.getElementById('patientIdPreview');
  const fullName = document.getElementById('fullName');
  const gender = document.getElementById('gender');
  const age = document.getElementById('age');
  const location = document.getElementById('location');
  const regDate = document.getElementById('regDate');
  const radioEmergency = document.querySelector('input[value="Emergency"]');
  const radioOPD = document.querySelector('input[value="OPD"]');
  const modalOverlay = document.getElementById('pdfModal');
  const modalContentDiv = document.getElementById('modalContent');
  const pdfPrintDiv = document.getElementById('pdfPrintContent');

  function showMessage(msg, type = 'info') {
    feedbackDiv.style.display = 'block';
    feedbackDiv.textContent = msg;
    feedbackDiv.className = `message-area ${type === 'success' ? 'success-message' : (type === 'error' ? 'error-message' : 'info-message')}`;
    if (type !== 'error') setTimeout(() => feedbackDiv.style.display = 'none', 5000);
  }

  function setDefaultDate() {
    const today = new Date();
    regDate.value = today.toISOString().split('T')[0];
  }
  setDefaultDate();

  async function initializeSystem() {
    try {
      // Default doctors are NOT seeded. Database must contain doctors manually.
      const patientCounter = ref(db, 'counters/patientCounter');
      if ((await get(patientCounter)).val() === null) await set(patientCounter, 0);
      const emIdx = ref(db, 'counters/doctorAllocationIndex/Emergency');
      if ((await get(emIdx)).val() === null) await set(emIdx, 0);
      const opdIdx = ref(db, 'counters/doctorAllocationIndex/OPD');
      if ((await get(opdIdx)).val() === null) await set(opdIdx, 0);
      await updatePatientIdPreview();
    } catch (err) {
      console.error("Init error", err);
      showMessage("⚠️ System init warning, but you can still submit.", "info");
    }
  }

  async function updatePatientIdPreview() {
    const counter = (await get(ref(db, 'counters/patientCounter'))).val() || 0;
    patientIdPreview.value = `PAT-${String(counter + 1).padStart(4, '0')}`;
  }

  async function allocateDoctor(consultType) {
    const doctorsSnap = await get(ref(db, 'doctors'));
    if (!doctorsSnap.exists()) throw new Error("No doctors found. Please add doctors to the database.");
    const allDoctors = doctorsSnap.val();
    const wardDoctors = Object.entries(allDoctors)
      .filter(([_, doc]) => doc.ward === consultType)
      .map(([id, doc]) => ({ id, name: doc.name, ward: doc.ward }));
    if (wardDoctors.length === 0) throw new Error(`No ${consultType} doctor available.`);

    const indexRef = ref(db, `counters/doctorAllocationIndex/${consultType}`);
    let allocatedDoctor = null;
    const result = await runTransaction(indexRef, (currentIndex) => {
      let idx = (currentIndex === null || currentIndex === undefined) ? 0 : currentIndex;
      if (idx >= wardDoctors.length) idx = 0;
      allocatedDoctor = wardDoctors[idx];
      const nextIdx = (idx + 1) % wardDoctors.length;
      return nextIdx;
    });
    if (!result.committed || !allocatedDoctor) throw new Error("Allocation conflict, please retry.");
    return allocatedDoctor;
  }

  async function generatePDF(patientData, doctorName) {
    const element = pdfPrintDiv;
    try {
      await new Promise(resolve => setTimeout(resolve, 200));
      const canvas = await html2canvas(element, { scale: 2, backgroundColor: '#ffffff', logging: false });
      const imgData = canvas.toDataURL('image/png');
      const { jsPDF } = window.jspdf;
      const pdf = new jsPDF('p', 'mm', 'a4');
      const imgWidth = 190;
      const imgHeight = (canvas.height * imgWidth) / canvas.width;
      pdf.addImage(imgData, 'PNG', 10, 10, imgWidth, imgHeight);
      pdf.save(`IntelliHealth_${patientData.patientId}.pdf`);
    } catch (err) {
      console.error("PDF generation failed", err);
      showMessage("⚠️ Could not generate PDF, but registration is saved.", "error");
    }
  }

  function showSuccessModal(patientData, doctorName) {
    // modal content (popup)
    const modalHtml = `
      <h2>🏥 An Intelligent Healthcare System</h2>
      <div class="subhead">AI‑Based Diagnostic & Patient Management Solution</div>
      <div class="success-badge">✅ Registration Successful</div>
      <div class="details">
        <p><strong>Full Name:</strong> ${escapeHtml(patientData.fullName)}</p>
        <p><strong>Gender:</strong> ${escapeHtml(patientData.gender)}</p>
        <p><strong>Age:</strong> ${patientData.age}</p>
        <p><strong>Location:</strong> ${escapeHtml(patientData.location)}</p>
        <p><strong>Registration Date:</strong> ${patientData.registrationDate}</p>
        <p><strong>Patient ID:</strong> ${patientData.patientId}</p>
        <p><strong>Consultation Type:</strong> ${patientData.consultationType}</p>
        <p><strong>Allocated Doctor:</strong> ${escapeHtml(doctorName)}</p>
      </div>
      <div class="prescription-area">
        <label>📝 Doctor's Prescription:</label>
        <textarea rows="5" placeholder="Write prescription / notes here..."></textarea>
      </div>
      <button class="close-btn" id="closeModalBtn">OK & Generate PDF</button>
    `;
    modalContentDiv.innerHTML = modalHtml;

    // PDF hidden content - now with blue strip header for clear visibility
    const pdfHtml = `
      <div class="pdf-header">
        <h2>🏥 An Intelligent Healthcare System</h2>
        <div class="pdf-subhead">AI‑Based Diagnostic & Patient Management Solution</div>
      </div>
      <div class="pdf-content">
        <div class="success-badge-pdf">✅ Registration Successful</div>
        <div class="details-card">
          <p><strong>Name:</strong> ${escapeHtml(patientData.fullName)}</p>
          <p><strong>Gender:</strong> ${escapeHtml(patientData.gender)}</p>
          <p><strong>Age:</strong> ${patientData.age}</p>
          <p><strong>Location:</strong> ${escapeHtml(patientData.location)}</p>
          <p><strong>Registration Date:</strong> ${patientData.registrationDate}</p>
          <p><strong>Patient ID:</strong> ${patientData.patientId}</p>
          <p><strong>Consultation Type:</strong> ${patientData.consultationType}</p>
          <p><strong>Allocated Doctor:</strong> ${escapeHtml(doctorName)}</p>
        </div>
        <div class="prescription-pdf">
          <label>📝 Doctor's Prescription:</label>
          <textarea rows="5" placeholder="Write prescription / notes here..."></textarea>
        </div>
      </div>
    `;
    pdfPrintDiv.innerHTML = pdfHtml;

    modalOverlay.classList.add('active');

    setTimeout(() => {
      generatePDF(patientData, doctorName);
    }, 500);

    const closeBtn = document.getElementById('closeModalBtn');
    if (closeBtn) {
      closeBtn.addEventListener('click', () => {
        modalOverlay.classList.remove('active');
      });
    }
  }

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    submitBtn.disabled = true;
    submitBtn.innerHTML = "⏳ Processing...";
    feedbackDiv.style.display = "none";

    const name = fullName.value.trim();
    const genderVal = gender.value;
    const ageVal = parseInt(age.value);
    const loc = location.value.trim();
    const date = regDate.value;
    let consultType = null;
    if (radioEmergency.checked) consultType = "Emergency";
    else if (radioOPD.checked) consultType = "OPD";

    if (!name || !genderVal || isNaN(ageVal) || ageVal <= 0 || !loc || !consultType || !date) {
      showMessage("❌ Please fill all fields correctly.", "error");
      enableSubmit();
      return;
    }

    try {
      const doctor = await allocateDoctor(consultType);
      const patientCounterRef = ref(db, 'counters/patientCounter');
      const newIdResult = await runTransaction(patientCounterRef, (current) => (current === null ? 1 : current + 1));
      if (!newIdResult.committed) throw new Error("ID generation failed.");
      const patientNumber = newIdResult.snapshot.val();
      const patientId = `PAT-${String(patientNumber).padStart(4, '0')}`;

      const patientData = {
        patientId,
        fullName: name,
        gender: genderVal,
        age: ageVal,
        location: loc,
        registrationDate: date,
        consultationType: consultType,
        allocatedDoctorId: doctor.id,
        allocatedDoctorName: doctor.name,
        allocatedWard: doctor.ward,
        timestamp: Date.now()
      };
      await set(ref(db, `patients/${patientId}`), patientData);

      showMessage(`✅ Patient ${patientId} registered! Allocated: ${doctor.name} (${consultType})`, "success");
      showSuccessModal(patientData, doctor.name);

      fullName.value = '';
      gender.value = '';
      age.value = '';
      location.value = '';
      setDefaultDate();
      radioEmergency.checked = false;
      radioOPD.checked = false;
      await updatePatientIdPreview();
    } catch (err) {
      console.error(err);
      showMessage(`❌ ${err.message || "Submission failed."}`, "error");
    } finally {
      enableSubmit();
    }
  });

  function enableSubmit() {
    submitBtn.disabled = false;
    submitBtn.innerHTML = "✨ Submit & Allocate Doctor ✨";
  }

  initializeSystem();
</script>
</body>
</html>
