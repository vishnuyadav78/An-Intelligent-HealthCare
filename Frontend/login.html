<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>IntelliCare | AI Healthcare Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            /* Prevent iOS tap highlight for a more native feel */
            -webkit-tap-highlight-color: transparent; 
        }

        body {
            background: #f0f4f8;
            background-image: 
                radial-gradient(at 0% 0%, hsla(210,100%,93%,1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(225,100%,95%,1) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(199,100%,90%,1) 0, transparent 50%);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            position: relative;
            overflow: hidden;
        }

        /* Ambient floating orbs - Slowed down and GPU accelerated */
        body::before, body::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            opacity: 0.5;
            will-change: transform; /* Hardware acceleration */
            animation: float 15s infinite ease-in-out alternate;
        }

        body::before {
            width: 400px;
            height: 400px;
            background: #bae6fd;
            top: -10%;
            left: -10%;
        }

        body::after {
            width: 500px;
            height: 500px;
            background: #e0e7ff;
            bottom: -20%;
            right: -10%;
            animation-delay: -7.5s;
        }

        @keyframes float {
            0% { transform: translate3d(0, 0, 0) scale(1); }
            100% { transform: translate3d(0, -40px, 0) scale(1.05); }
        }

        /* main container */
        .login-container {
            width: 100%;
            max-width: 480px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        /* top heading section */
        .hero-heading {
            text-align: center;
            margin-bottom: 2.5rem;
            animation: fadeSlideDown 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
        }

        .hero-heading h1 {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            line-height: 1.3;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0369a1 100%);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 1rem;
        }

        .hero-sub {
            font-size: 0.85rem;
            color: #475569;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(8px);
            padding: 0.5rem 1.2rem;
            border-radius: 100px;
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .hero-sub i {
            color: #0ea5e9;
        }

        /* main card - glassmorphism */
        .login-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 1.5rem;
            padding: 2.5rem 2rem;
            box-shadow: 
                0 25px 50px -12px rgba(15, 23, 42, 0.1), 
                0 0 0 1px rgba(255, 255, 255, 0.9) inset;
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            animation: fadeSlideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.1s forwards;
            opacity: 0;
            will-change: transform, box-shadow;
        }

        .login-card:hover {
            transform: translateY(-4px);
            box-shadow: 
                0 30px 60px -12px rgba(15, 23, 42, 0.15), 
                0 0 0 1px rgba(255, 255, 255, 1) inset;
        }

        /* Staggered form elements */
        .brand-icon, .input-group, .login-btn, .footer-note {
            opacity: 0;
            animation: smoothReveal 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .brand-icon { animation-delay: 0.3s; }
        .input-group:nth-of-type(1) { animation-delay: 0.4s; }
        .input-group:nth-of-type(2) { animation-delay: 0.5s; }
        .login-btn { animation-delay: 0.6s; }
        .footer-note { animation-delay: 0.7s; }

        /* brand icon inside card */
        .brand-icon {
            text-align: center;
            margin-bottom: 2rem;
        }

        .brand-icon span {
            background: linear-gradient(135deg, #e0f2fe 0%, #bae6fd 100%);
            width: 72px;
            height: 72px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 24px;
            font-size: 2.2rem;
            color: #0284c7;
            box-shadow: 0 10px 25px -5px rgba(2, 132, 199, 0.3);
            transform: rotate(-5deg);
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); /* Bouncy smooth easing */
        }

        .login-card:hover .brand-icon span {
            transform: rotate(0deg) scale(1.08);
        }

        /* form groups */
        .input-group {
            margin-bottom: 1.5rem;
        }

        .input-label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: #334155;
            margin-bottom: 0.6rem;
            letter-spacing: -0.2px;
            transition: color 0.3s ease;
        }

        .input-label i {
            color: #64748b;
            transition: color 0.3s ease;
        }

        .input-field-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-field-wrapper i:not(.toggle-pwd) {
            position: absolute;
            left: 18px;
            font-size: 1.1rem;
            color: #94a3b8;
            transition: color 0.3s ease, transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            pointer-events: none;
            z-index: 2;
        }

        .input-field-wrapper input {
            width: 100%;
            padding: 1rem 1rem 1rem 3rem;
            font-size: 0.95rem;
            font-weight: 500;
            font-family: 'Inter', sans-serif;
            border: 2px solid transparent;
            border-radius: 1rem;
            background: #f1f5f9;
            color: #0f172a;
            outline: none;
            transition: background 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
        }

        /* Focus states - Ultra smooth transitions */
        .input-field-wrapper input:focus {
            background: #ffffff;
            border-color: #38bdf8;
            box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.15);
        }

        .input-field-wrapper:focus-within i:not(.toggle-pwd) {
            color: #0284c7;
            transform: scale(1.15);
        }
        
        .input-group:focus-within .input-label {
            color: #0284c7;
        }
        .input-group:focus-within .input-label i {
            color: #0284c7;
        }

        .input-field-wrapper input::placeholder {
            color: #94a3b8;
            font-weight: 400;
            transition: opacity 0.3s ease;
        }

        .input-field-wrapper input:focus::placeholder {
            opacity: 0.5; /* Smoothly fade placeholder on focus */
        }

        .password-wrapper input {
            padding-right: 3rem;
        }

        /* toggle password eye */
        .toggle-pwd {
            position: absolute;
            right: 18px;
            cursor: pointer;
            font-size: 1.1rem;
            color: #94a3b8;
            transition: color 0.2s ease, transform 0.2s ease;
            z-index: 2;
        }

        .toggle-pwd:hover {
            color: #0ea5e9;
            transform: scale(1.1);
        }

        /* login button */
        .login-btn {
            background: linear-gradient(135deg, #0284c7 0%, #2563eb 100%);
            border: none;
            width: 100%;
            padding: 1rem 0;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 1.05rem;
            border-radius: 1rem;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            margin-top: 1rem;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 10px 20px -5px rgba(37, 99, 235, 0.4);
            position: relative;
            overflow: hidden;
            will-change: transform, box-shadow;
        }

        /* Button subtle shine effect */
        .login-btn::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.25), transparent);
            transform: skewX(-20deg);
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .login-btn:hover::after {
            left: 150%;
        }

        .login-btn i {
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 25px -5px rgba(37, 99, 235, 0.5);
        }

        .login-btn:hover i {
            transform: translateX(6px);
        }

        /* Smooth, tactile compression on click */
        .login-btn:active {
            transform: translateY(1px) scale(0.98);
            box-shadow: 0 5px 10px -5px rgba(37, 99, 235, 0.4);
            transition: all 0.1s ease; /* Faster snap on active */
        }

        .error-message {
            margin-top: 1.2rem;
            padding: 0.8rem 1rem;
            background: #fef2f2;
            border-radius: 0.8rem;
            color: #ef4444;
            font-size: 0.85rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 6px -1px rgba(239, 68, 68, 0.1);
            animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both;
            /* Added transition for smooth JS hiding */
            transition: opacity 0.3s ease, transform 0.3s ease; 
        }

        .error-message i {
            font-size: 1rem;
        }

        .footer-note {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.8rem;
            color: #64748b;
            font-weight: 500;
        }

        .footer-note i {
            color: #10b981;
        }

        /* Animations */
        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translate3d(0, 40px, 0); }
            to { opacity: 1; transform: translate3d(0, 0, 0); }
        }

        @keyframes fadeSlideDown {
            from { opacity: 0; transform: translate3d(0, -20px, 0); }
            to { opacity: 1; transform: translate3d(0, 0, 0); }
        }

        @keyframes smoothReveal {
            from { opacity: 0; transform: translate3d(0, 15px, 0); }
            to { opacity: 1; transform: translate3d(0, 0, 0); }
        }

        @keyframes shake {
            10%, 90% { transform: translate3d(-2px, 0, 0); }
            20%, 80% { transform: translate3d(4px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-6px, 0, 0); }
            40%, 60% { transform: translate3d(6px, 0, 0); }
        }

        /* responsive adjustments */
        @media (max-width: 520px) {
            body { padding: 1rem; }
            .login-card { padding: 2rem 1.5rem; }
            .hero-heading h1 { font-size: 1.3rem; }
            .brand-icon span { width: 60px; height: 60px; font-size: 1.8rem; }
            .input-field-wrapper input { padding: 0.9rem 1rem 0.9rem 2.8rem; }
        }

        /* Auto-fill styling fix for modern browsers */
        input:-webkit-autofill,
        input:-webkit-autofill:hover, 
        input:-webkit-autofill:focus, 
        input:-webkit-autofill:active{
            -webkit-box-shadow: 0 0 0 30px #ffffff inset !important;
            -webkit-text-fill-color: #0f172a !important;
            border-radius: 1rem;
            transition: background-color 5000s ease-in-out 0s;
        }
    </style>
</head>
<body>

<div class="login-container">
    <div class="hero-heading">
        <h1>An Intelligent Healthcare System<br>Integrating AI-Based Diagnostic and Patient Management Solution</h1>
        <div class="hero-sub">
            <i class="fas fa-microchip"></i> <span>AI-Powered • HIPAA Ready • Smart Triage</span>
        </div>
    </div>

    <div class="login-card">
        <div class="brand-icon">
            <span><i class="fas fa-robot"></i></span>
        </div>

        <form id="loginForm" novalidate>
            <div class="input-group">
                <label class="input-label" for="username"><i class="fas fa-user-md" style="margin-right: 6px; font-size: 0.75rem;"></i> Username / ID</label>
                <div class="input-field-wrapper">
                    <i class="fas fa-user-circle"></i>
                    <input type="text" id="username" name="username" placeholder="e.g., diagnostic_admin" autocomplete="username" spellcheck="false">
                </div>
            </div>

            <div class="input-group">
                <label class="input-label" for="password"><i class="fas fa-key" style="margin-right: 6px; font-size: 0.75rem;"></i> Password</label>
                <div class="input-field-wrapper password-wrapper">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password">
                    <i class="fas fa-eye-slash toggle-pwd" id="togglePasswordIcon"></i>
                </div>
            </div>

            <button type="submit" class="login-btn">
                <span>Secure Login</span> <i class="fas fa-arrow-right"></i>
            </button>

            <div id="errorMsg" class="error-message" style="display: none; opacity: 0;"></div>
        </form>
    </div>
    <div class="footer-note">
        <i class="far fa-shield-alt"></i> End-to-end encrypted · Next-gen clinical intelligence
    </div>
</div>

<script>
    (function() {
        // ---------- HARDCODED CREDENTIALS ----------
        const VALID_USERNAME = "admin";
        const VALID_PASSWORD = "123";

        // DOM elements
        const loginForm = document.getElementById('loginForm');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const errorDiv = document.getElementById('errorMsg');
        const togglePwdIcon = document.getElementById('togglePasswordIcon');

        // Show error helper with smooth opacity
        function showError(message) {
            errorDiv.style.display = 'flex';
            // Slight delay to allow display:flex to apply before animating opacity
            requestAnimationFrame(() => {
                errorDiv.style.opacity = '1';
                errorDiv.style.transform = 'translateY(0)';
            });
            errorDiv.innerHTML = `<i class="fas fa-exclamation-triangle"></i> ${message}`;
            
            // Auto hide after 4 seconds smoothly
            setTimeout(() => {
                hideError();
            }, 4000);
        }

        // Smoothly hide error
        function hideError() {
            if (errorDiv.style.opacity === '1') {
                errorDiv.style.opacity = '0';
                errorDiv.style.transform = 'translateY(-5px)';
                // Wait for CSS transition to finish before hiding from DOM
                setTimeout(() => {
                    errorDiv.style.display = 'none';
                    errorDiv.innerHTML = '';
                }, 300); 
            }
        }

        // Toggle password visibility (modern)
        function togglePassword() {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            // toggle icon between eye-slash and eye
            if (type === 'text') {
                togglePwdIcon.classList.remove('fa-eye-slash');
                togglePwdIcon.classList.add('fa-eye');
            } else {
                togglePwdIcon.classList.remove('fa-eye');
                togglePwdIcon.classList.add('fa-eye-slash');
            }
        }

        // Add toggle event listener
        if (togglePwdIcon) {
            togglePwdIcon.addEventListener('click', (e) => {
                e.preventDefault();
                e.stopPropagation();
                togglePassword();
            });
        }

        // Validate and login
        function validateAndLogin(event) {
            event.preventDefault();
            hideError();

            const enteredUsername = usernameInput.value.trim();
            const enteredPassword = passwordInput.value;

            // Basic empty field validation
            if (!enteredUsername) {
                showError("❌ Username is required. Please enter your credential.");
                usernameInput.focus();
                return false;
            }
            if (!enteredPassword) {
                showError("❌ Password is required. Please enter your password.");
                passwordInput.focus();
                return false;
            }

            // Hardcoded credential check (exact match, case-sensitive)
            if (enteredUsername === VALID_USERNAME && enteredPassword === VALID_PASSWORD) {
                // Success: redirect to admin.html with feedback
                const btn = document.querySelector('.login-btn');
                const originalText = btn.innerHTML;
                btn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Authenticating...';
                btn.disabled = true;
                
                // Slight delay for better UX
                setTimeout(() => {
                    window.location.href = "admin.html";
                }, 400);
            } else {
                // Wrong credentials error
                showError("⚠️ Access Denied: Invalid username or password.");
                // Clear password field for security
                passwordInput.value = '';
                passwordInput.focus();
                
                // Subtle shake effect using CSS animation reset trick
                const card = document.querySelector('.login-card');
                if (card) {
                    card.style.animation = 'none';
                    card.offsetHeight; /* trigger reflow */
                    card.style.animation = 'shake 0.4s cubic-bezier(.36,.07,.19,.97) both';
                }
            }
            return false;
        }

        // Attach submit event
        if (loginForm) {
            loginForm.addEventListener('submit', validateAndLogin);
        }

        // Clear error when typing
        usernameInput.addEventListener('input', hideError);
        passwordInput.addEventListener('input', hideError);
        
    })();
</script>
</body>
</html>
